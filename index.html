<style>
/* ---------- Sistema visual Quin (tomado de Jornada Quin Actual.html) ---------- */
:root{
  --tinta:#091315; --tinta-2:#123b3d; --tinta-3:#17383a;
  --turquesa:#17c3c3; --turquesa-osc:#078f94; --turquesa-prof:#06777b;
  --menta:#bdf4f1; --menta-2:#c7faf5; --menta-3:#d7faf5; --menta-4:#cdedea; --menta-5:#e7faf8;
  --gris:#607174; --gris-2:#536568; --gris-3:#b6c4c5; --gris-4:#bfd0d1; --gris-5:#c7d3d4; --gris-6:#d4dfe0;
  --linea:#e8f0ef; --linea-2:#f2f4f4; --fondo:#f4f8f7; --blanco:#ffffff;
  --r:18px; --r-sm:12px; --r-lg:26px;
  --sombra:0 1px 2px rgba(9,19,21,.04), 0 8px 24px rgba(9,19,21,.06);
  --sombra-alta:0 2px 6px rgba(9,19,21,.06), 0 18px 48px rgba(9,19,21,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Montserrat",-apple-system,"Segoe UI",Roboto,sans-serif;
  background:var(--fondo); color:var(--tinta);
  -webkit-font-smoothing:antialiased; font-size:16px; line-height:1.45;
}
.wrap{max-width:1240px;margin:0 auto;padding:0 24px}
.kicker{font-weight:800;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--turquesa-osc)}
.quino{display:block}

/* ---------- Cabecera ---------- */
.header{background:var(--blanco);border-bottom:1px solid var(--linea)}
.header-in{display:flex;align-items:center;gap:18px;padding:20px 0}
.header-mascot{width:52px;height:52px;flex-shrink:0}
.header-txt{flex:1;min-width:0}
.eyebrow{font-size:14px;font-weight:800;letter-spacing:.13em;color:var(--turquesa-osc);text-transform:uppercase}
.header-title{font-size:30px;font-weight:900;color:var(--tinta);letter-spacing:-.024em;line-height:1.15}
.header-date{font-size:15px;font-weight:400;color:var(--gris);margin-top:2px}
.header-side{flex-shrink:0}
.btn-vista{background:var(--tinta);color:var(--blanco);font-size:14px;font-weight:600;padding:11px 20px;border-radius:999px;text-decoration:none;display:inline-block;transition:filter .16s, transform .16s}
.btn-vista:hover{filter:brightness(1.35);transform:translateY(-1px)}

/* ---------- Estructura general ---------- */
.seccion{padding:32px 0 44px}
.card{background:var(--blanco);border-radius:var(--r);padding:24px;box-shadow:var(--sombra);border:1px solid rgba(9,19,21,.04);margin-bottom:18px}
.card-title{font-size:22px;font-weight:900;color:var(--tinta);letter-spacing:-.016em;margin-bottom:4px}

/* ---------- Avisos ---------- */
.aviso{background:var(--menta-5);border:1px solid var(--menta);border-radius:var(--r-sm);padding:14px 16px;font-size:15px;color:var(--tinta-2);margin-bottom:16px}
.aviso b{font-weight:800}

/* ---------- KPIs ---------- */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.kpi{background:var(--blanco);border-radius:var(--r);padding:20px;box-shadow:var(--sombra);border:1px solid rgba(9,19,21,.04);display:flex;flex-direction:column;gap:3px;min-width:0}
.kpi-label{font-size:14px;font-weight:600;color:var(--gris-2);line-height:1.3}
.kpi-value{font-size:38px;font-weight:900;color:var(--tinta);letter-spacing:-.03em;line-height:1.05;font-variant-numeric:tabular-nums}
.kpi-unit{font-size:14px;font-weight:400;color:var(--gris)}
.kpi.destacada{background:var(--tinta)}
.kpi.destacada .kpi-label{color:var(--gris-5)}
.kpi.destacada .kpi-value{color:var(--turquesa)}
.kpi.destacada .kpi-unit{color:var(--gris-5)}

/* ---------- Gráfica ---------- */
.graf-nota{font-size:14px;color:var(--gris-2);margin-bottom:12px;line-height:1.5}
.leyenda{display:flex;flex-wrap:wrap;gap:18px;font-size:14px;font-weight:600;color:var(--gris-2);margin-bottom:10px}
.leyenda span{display:flex;align-items:center;gap:7px}
.cuad{width:11px;height:11px;border-radius:3px;display:inline-block}
.graf{position:relative;width:100%;height:270px}

/* ---------- Meta del equipo ---------- */
.meta-card{display:flex;flex-direction:column}
.meta-kicker{margin-bottom:6px}
.meta-title{font-size:22px;font-weight:900;color:var(--tinta);letter-spacing:-.016em;line-height:1.2}
.meta-value{font-size:24px;font-weight:900;color:var(--tinta);margin:12px 0 10px;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.barra{height:14px;background:var(--linea);border-radius:999px;overflow:hidden}
.barra-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--turquesa) 0%,var(--turquesa-osc) 100%);width:0;transition:width 1.1s cubic-bezier(.22,1,.36,1)}
.meta-pill-fila{margin-top:12px}
.meta-pill{display:inline-block;background:var(--menta-3);color:var(--turquesa-prof);font-size:14px;font-weight:800;padding:6px 16px;border-radius:999px;font-variant-numeric:tabular-nums}
.meta-note{font-size:14px;font-weight:400;color:var(--gris);margin-top:12px}

/* ---------- Ranking ---------- */
.rank-list{margin-top:6px;display:flex;flex-direction:column;gap:3px}
.rank-row{display:grid;grid-template-columns:32px 1fr;align-items:center;gap:13px;padding:11px 12px;border-radius:12px}
.rank-pos{width:29px;height:29px;border-radius:50%;background:var(--linea-2);color:var(--gris-2);font-size:14px;font-weight:800;display:grid;place-items:center}
.rank-row:nth-child(1) .rank-pos{background:var(--turquesa);color:var(--tinta);font-size:15px}
.rank-row:nth-child(2) .rank-pos{background:var(--menta);color:var(--turquesa-prof)}
.rank-row:nth-child(3) .rank-pos{background:var(--menta-3);color:var(--turquesa-prof)}
.rank-name{font-size:16px;font-weight:600;color:var(--tinta);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-nota{font-size:13px;color:var(--gris);margin-top:10px}

@media(max-width:620px){
  .wrap{padding:0 16px}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .header-title{font-size:26px}
  .kpi-value{font-size:32px}
}
</style>
</head>

<header class="header">

<script>
// ####################################################################
//  Página pública del equipo (paso 9.3). Sin login, sin datos privados:
//  solo lee lo que la base deja leer a cualquiera (metas, días no
//  laborables, el ranking ya calculado, y de jornadas SOLO fecha,
//  propias y si está cerrada — nunca el detalle por vendedor ni por
//  tienda). Las reglas de cálculo (reparto de fin de semana, meta del
//  día) son las mismas que usa el administrador en su pestaña "Vista
//  del vendedor" — pruebas/test-vendedor-publico.js comprueba que las
//  dos den siempre el mismo número, para que no se desarmen con el tiempo.
// ####################################################################
function claveFecha(y, m, d) {
  return y + "-" + String(m).padStart(2, "0") + "-" + String(d).padStart(2, "0");
}
var DIAS  = ["dom","lun","mar","mié","jue","vie","sáb"];
var MESES_L = ["enero","febrero","marzo","abril","mayo","junio",
               "julio","agosto","septiembre","octubre","noviembre","diciembre"];
function fdate(k){ var p=k.split("-"); return new Date(+p[0],+p[1]-1,+p[2]); }
function bonita(k){ if(!k) return "—"; var p=k.split("-");
  var MESES=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return DIAS[fdate(k).getDay()]+" "+p[2]+"-"+MESES[+p[1]-1]; }
function esc(t) {
  return String(t == null ? "" : t).replace(/[&<>"]/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
  });
}
// --- festivos de Colombia (idéntico a quin-admin.html) ---
function pascua(y) {
  var a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,
      f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,
      i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),
      mes=Math.floor((h+l-7*m+114)/31),dia=((h+l-7*m+114)%31)+1;
  return new Date(y,mes-1,dia);
}
function sumarDias(f,n){ var x=new Date(f); x.setDate(x.getDate()+n); return x; }
function alLunes(f){ var x=new Date(f),w=x.getDay(); if(w!==1) x.setDate(x.getDate()+((8-w)%7)); return x; }
var cacheFestivos = {};
function festivosColombia(y) {
  if (cacheFestivos[y]) return cacheFestivos[y];
  var P = pascua(y), R = {};
  function fijo(m,d,n){ R[claveFecha(y,m,d)] = n; }
  function mov(m,d,n){ var f=alLunes(new Date(y,m-1,d));
    R[claveFecha(f.getFullYear(),f.getMonth()+1,f.getDate())] = n; }
  function pas(n,nom,mv){ var f=sumarDias(P,n); if(mv) f=alLunes(f);
    R[claveFecha(f.getFullYear(),f.getMonth()+1,f.getDate())] = nom; }
  fijo(1,1,"Año Nuevo");   fijo(5,1,"Día del Trabajo");  fijo(7,20,"Independencia");
  fijo(8,7,"Batalla de Boyacá"); fijo(12,8,"Inmaculada"); fijo(12,25,"Navidad");
  mov(1,6,"Reyes Magos");  mov(3,19,"San José");         mov(6,29,"San Pedro y San Pablo");
  mov(8,15,"Asunción");    mov(10,12,"Día de la Raza");  mov(11,1,"Todos los Santos");
  mov(11,11,"Independencia de Cartagena");
  pas(-3,"Jueves Santo",false); pas(-2,"Viernes Santo",false);
  pas(43,"Ascensión",true); pas(64,"Corpus Christi",true); pas(71,"Sagrado Corazón",true);
  if (y >= 2026) mov(7,9,"Virgen de Chiquinquirá");
  cacheFestivos[y] = R;
  return R;
}
function porQueNoLaborable(clave) {
  if (diasManuales[clave]) return "marcado a mano";
  var p = clave.split("-"), f = fdate(clave);
  var fest = festivosColombia(+p[0])[clave];
  if (fest) return fest;
  if (f.getDay() === 6) return "sábado";
  if (f.getDay() === 0) return "domingo";
  return null;
}
function repartir(total, n) {
  var base = Math.floor(total / n), sobrante = total - base * n, r = [];
  for (var i = 0; i < n; i++) r.push(base);
  r[n - 1] += sobrante;
  return r;
}
function armarBloques(claves) {
  var bloques = [], act = null;
  claves.forEach(function (k, i) {
    var seguido = i === 0 ? true : (fdate(k) - fdate(claves[i-1])) === 86400000;
    if (porQueNoLaborable(k)) {
      if (!act || !seguido) { act = { dias: [] }; bloques.push(act); }
      act.dias.push(k);
    } else act = null;
  });
  return bloques;
}
function mesDeHoy(){
  var f = new Date();
  return f.getFullYear() + "-" + String(f.getMonth()+1).padStart(2,"0");
}
var META_TOTAL = 200, META_PROPIAS = 160;
function metasOrden(){
  return metas.slice().sort(function(a,b){
    if (a.desde !== b.desde) return a.desde < b.desde ? -1 : 1;
    return a.id - b.id;
  });
}
function metaEn(clave){
  var r = { total:META_TOTAL, propias:META_PROPIAS, desde:null };
  metasOrden().forEach(function(m){
    if (m.desde <= clave) r = { total:m.total, propias:m.propias, desde:m.desde };
  });
  return r;
}
function hoyClave(){ var f=new Date(); return claveFecha(f.getFullYear(), f.getMonth()+1, f.getDate()); }
function metaHoy(){ return metaEn(hoyClave()); }
function kpi(et,n,pie,dest){
  return "<div class='kpi"+(dest?" destacada":"")+"'><p class='kpi-label'>"+et+"</p>" +
         "<p class='kpi-value'>"+n+"</p>" +
         (pie?"<p class='kpi-unit'>"+pie+"</p>":"")+"</div>";
}
function animarBarras(){
  requestAnimationFrame(function(){
    setTimeout(function(){
      var bs = document.querySelectorAll(".barra-fill[data-w]");
      for (var i=0;i<bs.length;i++){
        bs[i].style.width = Math.min(100, parseFloat(bs[i].getAttribute("data-w"))) + "%";
      }
    }, 90);
  });
}
function vendGraficaEquipo(id, etiquetas, datos, claves, metaDia){
  var el = document.getElementById(id); if (!el) return;
  var metaMax = Math.max.apply(null, metaDia);
  var previa = Chart.getChart(el);
  if (previa) previa.destroy();
  new Chart(el, {
    type:"bar",
    data:{ labels:etiquetas, datasets:[{ label:"Propias del equipo", data:datos,
      backgroundColor:"#17c3c3", borderRadius:6 }]},
    options:{ responsive:true, maintainAspectRatio:false, layout:{ padding:{ top:22 } },
      plugins:{ legend:{display:false},
        tooltip:{ callbacks:{
          title:function(i){ return bonita(claves[i[0].dataIndex]); },
          footer:function(i){ var x=i[0].dataIndex, v=datos[x], m=metaDia[x];
            return "Meta del equipo " + m + " (" + (v>=m ? "cumplida" : "faltan "+(m-v)) + ")"; } } } },
      scales:{ x:{ grid:{display:false}, ticks:{autoSkip:false,font:{size:11},color:"#607174"} },
               y:{ beginAtZero:true, suggestedMax:metaMax, grid:{color:"#e8f0ef"},
                   ticks:{font:{size:11},color:"#607174"} } } }
  });
}

// ---- datos (los llena cargarDatos() con lo que responde Supabase) ----
var jornadas = {};    // { 'YYYY-MM-DD': { p:número, cerrada:true } } — solo días ya cerrados
var metas = [];
var diasManuales = {};
var rankingMes = [];  // [{ puesto, nombre }, ...] ya ordenado, sin cifras

function datosDelMesPublico(mSel){
  var s = {};
  Object.keys(jornadas).forEach(function(k){
    if (k.slice(0,7) === mSel) s[k] = jornadas[k];
  });
  return s;
}
function pintarVendedorPublico(){
  var mesActual = mesDeHoy(), p = mesActual.split("-");
  vendMes.textContent = "Mes en curso: " + MESES_L[+p[1]-1] + " " + p[0] + ". Cifras del equipo.";

  var D = datosDelMesPublico(mesActual), claves = Object.keys(D).sort();
  if (!claves.length) {
    vendContenido.innerHTML = "<div class='aviso'><b>Todavía no hay ventas cargadas este mes.</b></div>";
    return;
  }

  var abiertas = claves.filter(function(k){ return !D[k].cerrada; });
  var avisoBosquejo = "";
  if (abiertas.length) {
    var masReciente = abiertas.reduce(function(a,k){
      return (!a || (D[k].actualizado && D[k].actualizado > a)) ? D[k].actualizado : a;
    }, null);
    avisoBosquejo = "<div class='aviso'>" +
      "Hay <b>" + abiertas.length + " día" + (abiertas.length===1?"":"s") + "</b> que todavía no cierra el administrador. " +
      "Esas cifras pueden cambiar." +
      (masReciente ? " Subidas por última vez: " + new Date(masReciente).toLocaleString("es-CO", { dateStyle:"short", timeStyle:"short" }) + "." : "") +
      "</div>";
  }

  var eqDia = {}, eqRep = {}, eqEnMeta = 0;
  claves.forEach(function(k){ eqDia[k] = D[k].p; eqRep[k] = D[k].p; });
  armarBloques(claves).forEach(function(b){
    var suma = 0;
    b.dias.forEach(function(k){ suma += eqDia[k]; });
    var r = repartir(suma, b.dias.length);
    b.dias.forEach(function(k,i){ eqRep[k] = r[i]; });
  });
  var metaPro = claves.map(function(k){ return metaEn(k).propias; });
  claves.forEach(function(k,i){ if (eqRep[k] >= metaPro[i]) eqEnMeta++; });

  var n = claves.length;
  var eqTotal = claves.reduce(function(a,k){ return a + eqDia[k]; }, 0);
  var eqProm = n ? Math.round(eqTotal/n) : 0;
  var mHoy = metaHoy().propias;
  var mejor = null;
  claves.forEach(function(k){ if (!mejor || eqRep[k] > mejor.t) mejor = { k:k, t:eqRep[k] }; });

  var h = avisoBosquejo;

  h += "<div class='kpis'>" +
    kpi("Prendas propias del equipo", eqTotal, "en " + n + " día" + (n===1?"":"s"), true) +
    kpi("Promedio por día", eqProm, "meta de " + mHoy) +
    kpi("Días en meta", eqEnMeta, "de " + n + " día" + (n===1?"":"s")) +
    kpi("Mejor día del equipo", mejor ? mejor.t : "—", mejor ? bonita(mejor.k) : "") +
    "</div>";

  h += "<div class='card'>" +
    "<div class='card-title'>Cómo va el equipo</div>" +
    "<p class='graf-nota'>Prendas propias por día, con la meta del equipo.</p>" +
    "<div class='leyenda'><span><i class='cuad' style='background:#17c3c3'></i>Propias del equipo</span>" +
    "<span><i class='cuad' style='background:#091315;height:2px;width:18px;border-radius:0'></i>Meta del equipo</span></div>" +
    "<div class='graf'><canvas id='gEquipo'></canvas></div></div>";

  var metaPeriodo = metaPro.reduce(function(a,m){ return a+m; }, 0);
  var pctMeta = metaPeriodo ? Math.round(eqTotal/metaPeriodo*100) : 0;
  h += "<div class='card meta-card'>" +
    "<div class='kicker meta-kicker'>META DEL EQUIPO</div>" +
    "<div class='meta-title'>Meta de propias del mes</div>" +
    "<div class='meta-value'>" + eqTotal + " de " + metaPeriodo + " prendas</div>" +
    "<div class='barra'><div class='barra-fill' data-w='" + pctMeta + "'></div></div>" +
    "<div class='meta-pill-fila'><span class='meta-pill'>" +
    (eqTotal>=metaPeriodo ? "Meta cumplida" : "Faltan " + (metaPeriodo-eqTotal)) +
    "</span></div>" +
    "<p class='meta-note'>Esta es una meta del equipo, no una meta individual.</p></div>";

  h += "<div class='card'><div class='card-title'>Ranking del mes</div><div class='rank-list'>";
  rankingMes.slice(0,10).forEach(function(x,i){
    h += "<div class='rank-row'><div class='rank-pos'>" + (i===0 ? "🏆" : x.puesto) + "</div>" +
      "<div class='rank-name'>" + esc(x.nombre) + "</div></div>";
  });
  h += "</div>";
  if (rankingMes.length > 10) h += "<p class='rank-nota'>Se muestran los 10 primeros de " + rankingMes.length + ".</p>";
  h += "</div>";

  var canvasVieja = document.getElementById("gEquipo");
  if (canvasVieja) { var chViejo = Chart.getChart(canvasVieja); if (chViejo) chViejo.destroy(); }
  vendContenido.innerHTML = h;
  animarBarras();
